apiVersion: v1
kind: Secret
metadata:
  name: specheal-secrets
  namespace: specheal
type: Opaque
stringData:
  DATABASE_URL: postgresql://specheal:specheal-dev-password@specheal-postgres:5432/specheal
  POSTGRES_USER: specheal
  POSTGRES_PASSWORD: specheal-dev-password
  POSTGRES_DB: specheal
  OPENAI_API_KEY: replace-me
  OPENAI_MODEL: gpt-4o-mini
  NEXT_PUBLIC_BASE_URL: http://specheal.local
  PLAYWRIGHT_HEADLESS: "true"
  JIRA_SITE_URL: https://your-domain.atlassian.net
  JIRA_USER_EMAIL: replace-me@example.com
  JIRA_API_TOKEN: replace-me
  JIRA_PROJECT_KEY: SH
  JIRA_TASK_ISSUE_TYPE: Task
  JIRA_BUG_ISSUE_TYPE: Bug
